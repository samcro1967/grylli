<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-zinc-100 dark:bg-zinc-900 text-zinc-800 dark:text-zinc-100 min-h-screen">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grylli</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" type="image/x-icon" />
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
    <script defer src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-zinc-100 dark:bg-zinc-900 text-zinc-800 dark:text-zinc-100 min-h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-white dark:bg-zinc-800 border-b border-zinc-200 dark:border-zinc-700 z-20 flex items-center justify-between px-6">
      <!-- Show light icon in light mode, dark icon in dark mode -->
      <img src="{{ url_for('static', filename='icons/grylli_icon_light.png') }}"
           class="h-10 w-10 dark:hidden"
           alt="Grylli Icon Light" />
      <img src="{{ url_for('static', filename='icons/grylli_icon_dark.png') }}"
           class="h-10 w-10 hidden dark:inline"
           alt="Grylli Icon Dark" />

      <!-- Centered Grylli title -->
      <div class="absolute left-1/2 transform -translate-x-1/2 text-lg font-semibold text-black dark:text-white">
        Grylli
      </div>

      <!-- Profile Dropdown -->
      {% if current_user.is_authenticated and request and request.endpoint not in ['auth.bootstrap', 'auth.login'] %}
        <div x-data="{ open: false }" class="relative">
          <button @click="open = !open" class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 focus:outline-none">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M5.121 17.804A4 4 0 018 16h8a4 4 0 012.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>

          <!-- Dropdown Panel -->
          <div x-show="open" @click.outside="open = false"
               class="absolute right-0 mt-2 w-40 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded shadow-lg z-50"
               x-transition>
            <a href="{{ url_for('account.manage_account') }}" class="block px-4 py-2 text-sm hover:bg-zinc-100 dark:hover:bg-zinc-700 text-zinc-800 dark:text-zinc-100">Account</a>
            <a href="/about/" class="block px-4 py-2 text-sm hover:bg-zinc-100 dark:hover:bg-zinc-700 text-zinc-800 dark:text-zinc-100">About</a>
            <a href="{{ url_for('auth.logout') }}" class="block px-4 py-2 text-sm text-red-500 hover:bg-red-100 dark:hover:bg-red-900">Logout</a>
          </div>
        </div>
      {% endif %}

    </header>

    <div class="flex pt-16 h-screen">
      <!-- SIDEBAR -->
      <aside class="w-64 flex flex-col bg-white dark:bg-zinc-800 border-r border-zinc-200 dark:border-zinc-700">
        <!-- Nav links grow, push toggle down -->
        <div class="flex flex-col flex-grow overflow-y-auto px-4 py-6 space-y-2 text-sm">
          <a href="/" class="block px-3 py-2 rounded text-zinc-800 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-700">Home</a>

          {% if current_user.is_authenticated and current_user.role == 'admin' %}
            <a href="{{ url_for('admin.list_users') }}" class="block px-3 py-2 rounded text-zinc-800 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-700">Users</a>
          {% endif %}

          <a href="/messages/" class="block px-3 py-2 rounded text-zinc-800 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-700">Messages</a>
          <div class="flex-grow"></div> <!-- Push the toggle down -->
          <div class="pt-6 border-t border-zinc-200 dark:border-zinc-700">
            <button id="themeToggle" class="text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200">
              <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v1m0 16v1m8.66-13.66l-.707.707M4.05 19.95l-.707.707M21 12h-1M4 12H3m2.34-6.34l.707.707M19.95 19.95l.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-grow overflow-y-auto p-6">
        {% block content %}
        <!-- Page content here -->
        {% endblock %}
      </main>
    </div>

    <!-- TOASTS -->
    <div id="toast-container" class="fixed top-20 right-4 space-y-2 z-50"></div>

  </body>
</html>
