{% extends "layout.html" %}
{% block content %}
    <div class="max-w-lg mx-auto mt-20 text-center">
        <h1 class="text-4xl font-bold text-red-800 mb-4">404</h1>
        <p class="text-lg text-zinc-900 dark:text-zinc-200 mb-6">
            {{ _("Sorry, the page you are looking for does not exist.") }}
        </p>
        <a href="{{ url_for("index.index") }}"
           class="inline-block px-4 py-2 bg-blue-600 bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 transition rounded hover:bg-blue-700 transition">
            {{ _("Return Home") }}
        </a>
    </div>
{% endblock %}
