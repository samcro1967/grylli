{% extends "layout.html" %}
{% block content %}
    <div class="max-w-xl mx-auto mt-20 text-center">
        <h1 class="text-2xl font-semibold text-red-800 dark:text-red-400">500 - {{ _("Something went wrong") }}</h1>
        <p class="text-zinc-800 dark:text-zinc-700 mt-2">
            {{ _("An unexpected error occurred. Please try again later or contact support.") }}
        </p>
        <a href="{{ url_for("home.index") }}"
           class="inline-block px-4 py-2 bg-blue-600 bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 transition rounded hover:bg-blue-700 transition">
            {{ _("Return Home") }}
        </a>
    </div>
{% endblock %}
