{# ---------------------------------------------------------------------
  head.html
  app/templates/head.html
  Head for main layout
--------------------------------------------------------------------- #}
<head>
    <meta name="htmx-config"
          content='{"inlineScriptNonce":"{{ g.nonce }}","inlineStyleNonce":"{{ g.nonce }}","allowEval":false,"includeIndicatorStyles":false}'>
    <script src="{{ url_for('static', filename='js/safe-nonce.min.js') }}" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description"
          content="{{ _("Grylli is a secure message scheduling and delivery platform.") }}">
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <!-- Manifest + Icons -->
    <link rel="manifest" href="{{ url_for("pwa.manifest") }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Grylli">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon"
          href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <title>
        {% block title %}{{ _("Grylli") }}{% endblock %}
    </title>
    <link rel="icon"
          href="{{ url_for('static', filename='icons/favicon.ico') }}"
          type="image/x-icon" />
    <!-- Prevent dark mode flash -->
    <!-- <script type="module" nonce="{{ g.nonce }}"> -->
    <!-- try { -->
    <!-- const theme = localStorage.getItem('theme'); -->
    <!-- const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; -->
    <!-- document.documentElement.classList.toggle('dark', theme === 'dark' || (!theme && prefersDark)); -->
    <!-- } catch (e) { -->
    <!-- console.warn("Failed to set theme:", e); -->
    <!-- } -->
    <!-- </script> -->
    <!-- Main stylesheet -->
    <style nonce="{{ g.nonce }}">{% include 'static/css/critical.css' %}</style>
    <link href="{{ url_for('static', filename='css/styles.min.css') }}"
          rel="stylesheet" />
    <!-- Font Awesome (deferred) -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          integrity="sha384-..."
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    <noscript>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
              integrity="sha384-..."
              crossorigin="anonymous"
              referrerpolicy="no-referrer" />
    </noscript>
    <!-- Stimulus loader -->
    {% block scripts %}
        <script defer
                type="module"
                src="{{ url_for('static', filename='js/application.min.js') }}"></script>
    {% endblock %}
</head>
